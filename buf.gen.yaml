version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/AES-Services/metalhost-sdk/gen/go
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-openapi
    out: gen/openapi
    strategy: all
    opt:
      - format=yaml
      - features=connectrpc
      - path=metalhost.openapi.yaml
