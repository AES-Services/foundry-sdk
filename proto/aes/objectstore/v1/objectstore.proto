syntax = "proto3";

package aes.objectstore.v1;

// ObjectStoreService is Metalhost's S3-compatible object storage facade. Backed by MinIO in dev;
// pointed at a managed S3-compatible cluster in production. Each Bucket maps 1:1 to an S3
// bucket on the underlying store; per-object access is via presigned URLs (clients PUT/GET
// directly to MinIO, metalhostd never proxies object payloads).
//
// Bucket name is `buckets/{slug}`; the underlying S3 bucket name is the slug. Slug must be
// DNS-safe (lowercase, [a-z0-9-]) and globally unique within the Metalhost deployment — same
// uniqueness rule as S3 globally, scoped to the Metalhost MinIO tenant.
service ObjectStoreService {
  rpc CreateBucket(CreateBucketRequest) returns (CreateBucketResponse);
  rpc GetBucket(GetBucketRequest) returns (GetBucketResponse);
  rpc ListBuckets(ListBucketsRequest) returns (ListBucketsResponse);
  // DeleteBucket fails if the bucket is non-empty (S3 semantics). Use DeleteObject loop first.
  rpc DeleteBucket(DeleteBucketRequest) returns (DeleteBucketResponse);

  // CreatePresignedUploadURL returns a short-lived signed PUT URL for an object key in the
  // bucket. Caller does the upload directly to MinIO. Auth & quota are enforced at signing
  // time, not at upload time — once you have the URL you can use it until expiry.
  rpc CreatePresignedUploadURL(CreatePresignedUploadURLRequest) returns (CreatePresignedUploadURLResponse);
  rpc CreatePresignedDownloadURL(CreatePresignedDownloadURLRequest) returns (CreatePresignedDownloadURLResponse);
  rpc DeleteObject(DeleteObjectRequest) returns (DeleteObjectResponse);
  rpc ListObjects(ListObjectsRequest) returns (ListObjectsResponse);
}

message Bucket {
  string name = 1;
  string project_name = 2;
  int64 create_time_unix = 3;
  int64 update_time_unix = 4;
  map<string, string> labels = 5;
  map<string, string> annotations = 6;
}

message CreateBucketRequest {
  // Bucket name as `buckets/{slug}`. Slug must be DNS-safe and unique.
  string name = 1;
  string project_name = 2;
  map<string, string> labels = 3;
  map<string, string> annotations = 4;
  string idempotency_key = 5;
}

message CreateBucketResponse {
  Bucket bucket = 1;
}

message GetBucketRequest {
  string name = 1;
}

message GetBucketResponse {
  Bucket bucket = 1;
}

message ListBucketsRequest {
  // Filter by project; empty = all buckets the caller has access to.
  string project_name = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListBucketsResponse {
  repeated Bucket buckets = 1;
  string next_page_token = 2;
}

message DeleteBucketRequest {
  string name = 1;
  string idempotency_key = 2;
}

message DeleteBucketResponse {}

message CreatePresignedUploadURLRequest {
  // Bucket name (`buckets/{slug}`).
  string bucket_name = 1;
  // Object key inside the bucket — opaque path-like string. Forward slashes ok.
  string object_key = 2;
  // Default 3600. Max 86400 (24h) — enforced server-side.
  int32 expires_seconds = 3;
}

message CreatePresignedUploadURLResponse {
  // Direct S3 URL the client PUTs the object body to.
  string upload_url = 1;
  int64 expires_at_unix = 2;
}

message CreatePresignedDownloadURLRequest {
  string bucket_name = 1;
  string object_key = 2;
  int32 expires_seconds = 3;
}

message CreatePresignedDownloadURLResponse {
  string download_url = 1;
  int64 expires_at_unix = 2;
}

message DeleteObjectRequest {
  string bucket_name = 1;
  string object_key = 2;
  string idempotency_key = 3;
}

message DeleteObjectResponse {}

message ListObjectsRequest {
  string bucket_name = 1;
  // Optional key prefix filter. "" = all keys.
  string prefix = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ObjectInfo {
  string key = 1;
  int64 size_bytes = 2;
  int64 last_modified_unix = 3;
  string etag = 4;
}

message ListObjectsResponse {
  repeated ObjectInfo objects = 1;
  string next_page_token = 2;
}
